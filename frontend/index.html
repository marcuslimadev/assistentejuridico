<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LexPraxis IA - Assistente Jurídico</title>
  <link rel="icon" type="image/png" href="logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html { transition: font-size 0.2s; }

    @media (max-width: 640px) {
      .chat-bubble { max-width: 98% !important; font-size: 1rem; }
      .history-panel { border-left: none !important; border-top: 1px solid #e2e8f0; }
    }

    .chat-background {
      background-image: url('logo.png');
      background-repeat: no-repeat;
      background-position: center;
      background-size: 300px;
      opacity: 0.08;
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
  </style>
</head>
<body class="bg-gradient-to-tr from-slate-200 to-slate-400 min-h-screen flex flex-col items-center font-sans py-0 sm:py-4">

  <!-- TESTE VISUAL (remova depois) -->
  <img src="logo.png" alt="Logo Teste" style="position:fixed;top:8px;left:8px;width:100px;z-index:99999;opacity:0.8;pointer-events:none;">

  <!-- CONTAINER PRINCIPAL -->
  <div class="w-full max-w-full sm:max-w-6xl rounded-none sm:rounded-3xl overflow-hidden shadow-none sm:shadow-2xl flex flex-col sm:flex-row bg-white/80 border-0 sm:border border-slate-300 h-screen sm:h-[90vh]">
    
    <!-- CHAT -->
    <div class="flex flex-col flex-1 h-[60vh] sm:h-full relative">
      <!-- Marca d’água -->
      <div class="chat-background"></div>

      <div class="flex justify-end p-2 gap-2 bg-slate-100 border-b border-slate-200 z-10">
        <button onclick="ajustarFonte(-1)" title="Diminuir texto" class="rounded p-1 px-2 bg-slate-200 hover:bg-slate-300 text-lg font-bold text-slate-700">A-</button>
        <button onclick="ajustarFonte(1)" title="Aumentar texto" class="rounded p-1 px-2 bg-slate-200 hover:bg-slate-300 text-lg font-bold text-slate-700">A+</button>
      </div>

      <div class="flex-1 overflow-y-auto px-2 sm:px-10 py-4 sm:py-8 space-y-5 bg-white/90 z-10" id="chatArea">
        <div id="messages" class="flex flex-col relative z-10"></div>
      </div>

      <form id="messageForm" class="flex items-end gap-2 sm:gap-3 p-2 sm:p-5 bg-slate-100 border-t border-slate-200 z-10">
        <textarea id="mensagem" placeholder="Digite sua mensagem..." required
          class="flex-1 resize-none rounded-xl bg-slate-50 text-slate-800 p-3 min-h-[44px] max-h-[120px] outline-none border border-slate-200 focus:border-slate-400 shadow-sm text-base sm:text-lg"></textarea>
        <button type="submit"
          class="px-5 py-3 rounded-xl bg-gradient-to-br from-indigo-500 to-blue-400 text-white font-bold shadow-md hover:from-indigo-600 hover:to-blue-500 transition text-base sm:text-lg">
          Enviar
        </button>
      </form>
    </div>

    <!-- HISTÓRICO -->
    <div class="history-panel flex flex-col w-full sm:w-[350px] h-[40vh] sm:h-full bg-slate-50 border-t sm:border-t-0 sm:border-l border-slate-200">
      <div class="px-4 sm:px-6 pt-5 sm:pt-7 pb-2 sm:pb-3 border-b border-slate-200 bg-slate-100">
        <div class="font-semibold text-lg sm:text-lg text-slate-700 text-center">Histórico</div>
        <input type="text" id="filtroHistorico" placeholder="Filtrar histórico..." 
               class="mt-3 mb-2 w-full rounded-lg border border-slate-300 px-3 py-2 text-base bg-white focus:ring-2 focus:ring-blue-300 focus:outline-none transition"/>
      </div>
      <div class="flex-1 overflow-y-auto px-2 py-2" id="historicoScroll">
        <div id="history" class="space-y-3"></div>
      </div>
      <button class="w-full py-4 text-base font-semibold bg-indigo-600 text-white hover:bg-indigo-700 transition" onclick="logout()">
        Sair
      </button>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="config.js"></script>
  <script>
    const usuario_id = getCookie("usuario_id");
    if (!usuario_id) { window.location.href = "login.html"; }

    const messagesEl = document.getElementById("messages");
    const form = document.getElementById("messageForm");
    const msgInput = document.getElementById("mensagem");
    const historyEl = document.getElementById("history");
    const filtroInput = document.getElementById("filtroHistorico");
    let historicoGlobal = [];

    window.addEventListener('DOMContentLoaded', () => {
      appendMessage(
        "👋 <b>Olá!</b><br>Sou seu Assistente Jurídico Nacional.<br><br>" +
        "Informe o número do processo, faça perguntas jurídicas ou peça resumos e informações sobre ações judiciais de qualquer tribunal do Brasil.",
        "assistant", false
      );
      carregarHistorico();
    });

    form.onsubmit = async (e) => {
      e.preventDefault();
      enviarMensagem();
    };

    msgInput.addEventListener('keydown', function(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        form.requestSubmit();
      }
    });

    function enviarMensagem() {
      const mensagem = msgInput.value.trim();
      if (!mensagem) return;
      appendMessage(mensagem, "user", false);
      msgInput.value = "";
      msgInput.focus();
      fetch(API_BASE + "chat.php", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ mensagem }),
      })
      .then(res => res.json())
      .then(data => {
        if (data.resposta === "Você não possui mais acessos.") {
          appendMessage("Você não possui mais acessos. Entre em contato: https://wa.me/5592992287144", "assistant", false);
        } else {
          appendMessage(data.resposta, "assistant", true);
        }
        carregarHistorico();
      })
      .catch(() => appendMessage("Erro ao se comunicar com o servidor.", "assistant", false));
    }

    function appendMessage(text, role, enableCopyBtn = true) {
      const div = document.createElement("div");
      div.className =
        "chat-bubble " +
        (role === "user"
          ? "self-end bg-gradient-to-br from-indigo-100 to-blue-50 text-indigo-900 border border-indigo-200"
          : "self-start bg-white text-slate-900 border border-slate-200") +
        " max-w-[98%] sm:max-w-[75%] px-4 sm:px-5 py-3 sm:py-4 rounded-2xl shadow text-base whitespace-pre-line mb-2 relative flex flex-col";
      div.style.alignSelf = (role === "user" ? "flex-end" : "flex-start");

      const textDiv = document.createElement("div");
      textDiv.innerHTML = text.replace(/\n/g, "<br>");
      div.appendChild(textDiv);

      if (role === "assistant" && enableCopyBtn) {
        const copyBtn = document.createElement("button");
        copyBtn.type = "button";
        copyBtn.className = "mt-3 px-4 py-2 rounded text-xs sm:text-sm bg-slate-200 hover:bg-slate-300 text-slate-700 transition font-semibold w-fit self-end";
        copyBtn.innerText = "Copiar";
        copyBtn.onclick = () => {
          copiarTexto(text);
          copyBtn.innerText = "Copiado!";
          copyBtn.disabled = true;
          setTimeout(() => {
            copyBtn.innerText = "Copiar";
            copyBtn.disabled = false;
          }, 2000);
        };
        div.appendChild(copyBtn);
      }

      messagesEl.appendChild(div);
      div.scrollIntoView({ behavior: "smooth" });
    }

    function copiarTexto(texto) {
      const temp = document.createElement("textarea");
      temp.value = texto.replace(/<br>/g, '\n');
      document.body.appendChild(temp);
      temp.select();
      document.execCommand("copy");
      document.body.removeChild(temp);
    }

    function carregarHistorico() {
      fetch(API_BASE + "historico.php?usuario_id=" + usuario_id)
        .then(r => r.json())
        .then(list => {
          historicoGlobal = list;
          renderHistorico(list);
        });
    }

    function renderHistorico(list) {
      historyEl.innerHTML = "";
      if (!list.length) {
        historyEl.innerHTML = "<div class='text-center text-slate-400 py-4'>Sem histórico.</div>";
        return;
      }
      list.forEach((item, idx) => {
        const id = "acc" + idx;
        historyEl.innerHTML += `
          <div class="bg-white rounded-xl shadow-sm border border-slate-200 group">
            <button class="flex items-center w-full px-3 sm:px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-300 transition group-hover:bg-slate-100"
                    data-bs-toggle="collapse" data-bs-target="#c${id}" aria-expanded="false">
              <div class="truncate font-medium text-sm text-slate-800">${item.numero_processo || "Consulta"}</div>
              <div class="ml-2 text-xs text-slate-500">${item.data_hora ? formatData(item.data_hora) : ""}</div>
              <span class="ml-auto px-2 py-1 bg-indigo-600 text-white rounded font-semibold text-xs">${item.saldo_restante} tokens</span>
              <svg class="ml-3 w-4 h-4 text-slate-400 group-hover:text-indigo-700 transition" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
              </svg>
            </button>
            <div id="c${id}" class="hidden px-3 sm:px-5 pb-3 sm:pb-4 pt-1 border-t border-slate-100 accordion-collapse">
              <div class="relative">
                <button class="absolute top-0 right-0 text-slate-400 hover:text-red-600 font-bold text-lg px-2 rounded transition"
                  onclick="excluirHistorico(${item.id}, event)" title="Excluir histórico">&times;</button>
                <pre class="mt-4 mb-2 text-xs text-slate-800 whitespace-pre-line break-words">${item.retorno_api || ''}</pre>
                <button class="mt-3 px-4 py-2 rounded text-xs sm:text-sm bg-slate-200 hover:bg-slate-300 text-slate-700 transition font-semibold w-fit"
                  onclick="copiarTextoHist(event, \`${(item.retorno_api || '').replace(/`/g, '\\`').replace(/\\/g,'\\\\').replace(/'/g,"\\'")}\`)">Copiar</button>
              </div>
            </div>
          </div>`;
      });

      historyEl.querySelectorAll("button[data-bs-toggle='collapse']").forEach(btn => {
        btn.onclick = function(e){
          e.preventDefault();
          const id = btn.getAttribute("data-bs-target");
          const el = historyEl.querySelector(id);
          if (el.classList.contains("hidden")) {
            historyEl.querySelectorAll(".accordion-collapse").forEach(x=>x.classList.add("hidden"));
            el.classList.remove("hidden");
          } else {
            el.classList.add("hidden");
          }
        }
      });
    }

    function copiarTextoHist(e, texto) {
      e.stopPropagation();
      const temp = document.createElement("textarea");
      temp.value = texto.replace(/<br>/g, '\n');
      document.body.appendChild(temp);
      temp.select();
      document.execCommand("copy");
      document.body.removeChild(temp);
      const btn = e.target;
      const original = btn.innerText;
      btn.innerText = "Copiado!";
      btn.disabled = true;
      setTimeout(() => {
        btn.innerText = original;
        btn.disabled = false;
      }, 2000);
    }

    function formatData(dt) {
      if (!dt) return "";
      const d = new Date(dt.replace(" ", "T"));
      return d.toLocaleString("pt-BR").replace(",", " às");
    }

    function getCookie(name) {
      const v = `; ${document.cookie}`;
      const p = v.split(`; ${name}=`);
      if (p.length === 2) return p.pop().split(";").shift();
    }

    function logout() {
      document.cookie = "usuario_id=; Max-Age=0; path=/";
      window.location.reload();
    }

    let fontSize = 16;
    function ajustarFonte(delta) {
      fontSize = Math.max(12, Math.min(28, fontSize + delta));
      document.documentElement.style.fontSize = fontSize + "px";
    }
  </script>
</body>
</html>
