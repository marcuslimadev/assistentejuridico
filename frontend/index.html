<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Assistente Jurídico Nacional</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container-fluid">
    <div class="row">
      <div class="col-md-8 p-4">
        <div id="auth" class="text-center">
          <h2>Login</h2>
          <form id="loginForm">
            <input type="email" id="email" placeholder="Email" class="form-control mb-2" required />
            <input type="password" id="senha" placeholder="Senha" class="form-control mb-2" required />
            <button type="submit" class="btn btn-success w-100">Entrar</button>
            <div class="form-text">Não tem conta? <a href="#" onclick="showRegister()">Registre-se</a></div>
          </form>

          <form id="registerForm" class="d-none">
            <input type="text" id="nome" placeholder="Nome" class="form-control mb-2" required />
            <input type="email" id="regEmail" placeholder="Email" class="form-control mb-2" required />
            <input type="password" id="regSenha" placeholder="Senha" class="form-control mb-2" required />
            <button type="submit" class="btn btn-primary w-100">Registrar</button>
            <div class="form-text">Já tem conta? <a href="#" onclick="showLogin()">Voltar ao login</a></div>
          </form>
        </div>

        <div id="app" class="d-none">
          <h3>Assistente Jurídico Nacional</h3>
          <p class="text-muted">Consulte processos com seu token</p>
          <div id="mensagens" class="border p-3 rounded mb-3 bg-white" style="min-height: 200px;"></div>
          <form id="formConsulta">
            <input id="mensagem" placeholder="Número do processo ou pergunta..." class="form-control mb-2" required />
            <button class="btn btn-success w-100" type="submit">Consultar</button>
          </form>
          <button onclick="logout()" class="btn btn-danger mt-3 w-100">Sair</button>
        </div>
      </div>

      <div id="historicoContainer" class="col-md-4 p-3 d-none">
        <h5>Histórico de Consultas</h5>
        <div class="accordion" id="historico"></div>
      </div>
    </div>
  </div>

  <script src="js/ui.js"></script>
  <script src="js/events.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
