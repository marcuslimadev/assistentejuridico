<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LexPraxis IA - Login</title>
  <link rel="icon" type="image/png" href="logo.png">
  <script>
    (function () {
      const savedTheme = localStorage.getItem("lp_theme") || "darkly";
      document.write('<link id="themeStylesheet" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/' + savedTheme + '/bootstrap.min.css">');
    })();
  </script>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 5rem;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      padding: 2.5rem 2rem;
    }

    .logo-section {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-section img {
      width: 70px;
      margin-bottom: 1rem;
      filter: drop-shadow(0 0 16px rgba(55,161,199,0.4));
    }

    .logo-section h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    .logo-section p {
      font-size: 0.9rem;
      color: #adb5bd;
    }

    .form-floating .form-control {
      background-color: #2c2f3a;
      border-color: #3d4155;
      color: #e9ecef;
    }

    .form-floating .form-control:focus {
      background-color: #2c2f3a;
      border-color: #375a7f;
      color: #e9ecef;
      box-shadow: 0 0 0 0.2rem rgba(55,90,127,0.35);
    }

    .form-floating label {
      color: #868e96;
    }

    .form-floating .form-control::placeholder { color: transparent; }

    .btn-entrar {
      font-weight: 600;
      letter-spacing: 0.03em;
      padding: 0.75rem;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 1.5rem 0;
      color: #6c757d;
      font-size: 0.85rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #2c2f3a;
    }

    .spinner-border-sm {
      width: 1rem;
      height: 1rem;
      border-width: 0.15em;
    }
  </style>
</head>

<body>
  <div class="position-fixed top-0 end-0 p-3" style="z-index: 1055;">
    <label for="themeSelector" class="form-label small mb-1">Tema</label>
    <select id="themeSelector" class="form-select form-select-sm">
      <option value="darkly">Darkly</option>
      <option value="cosmo">Cosmo</option>
      <option value="flatly">Flatly</option>
      <option value="litera">Litera</option>
      <option value="lux">Lux</option>
      <option value="materia">Materia</option>
      <option value="minty">Minty</option>
      <option value="pulse">Pulse</option>
      <option value="sandstone">Sandstone</option>
      <option value="slate">Slate</option>
      <option value="solar">Solar</option>
      <option value="superhero">Superhero</option>
      <option value="vapor">Vapor</option>
      <option value="yeti">Yeti</option>
      <option value="zephyr">Zephyr</option>
    </select>
  </div>

  <div class="login-card">
    <div class="card shadow-lg border-0" style="background:#222736;">
      <div class="card-body p-4 p-md-5">

        <div class="logo-section">
          <img src="logo.png" alt="LexPraxis IA">
          <h1 class="text-white">LexPraxis IA</h1>
          <p>Entre na sua conta para continuar</p>
        </div>

        <div class="form-floating mb-3">
          <input type="text" id="email" class="form-control" placeholder="E-mail ou telefone" autocomplete="username" required>
          <label for="email">E-mail ou telefone</label>
        </div>

        <div class="form-floating mb-3">
          <input type="password" id="senha" class="form-control" placeholder="Senha" autocomplete="new-password" required>
          <label for="senha">Senha</label>
        </div>

        <div class="d-grid mt-4">
          <button id="btnEntrar" class="btn btn-primary btn-entrar">
            Entrar
          </button>
        </div>

        <div id="loginErro" class="alert alert-danger mt-3 mb-0 text-center py-2 d-none" role="alert"></div>

        <div class="divider"><span>ou</span></div>

        <p class="text-center mb-0" style="font-size:.9rem; color:#adb5bd;">
          Não tem conta?
          <a href="registro.html" class="text-info fw-semibold text-decoration-none">Registre-se</a>
        </p>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="config.js"></script>
  <script>
    const themeSelector = document.getElementById("themeSelector");
    const themeStylesheet = document.getElementById("themeStylesheet");
    const currentTheme = localStorage.getItem("lp_theme") || "darkly";
    themeSelector.value = currentTheme;
    themeSelector.addEventListener("change", function () {
      const theme = this.value;
      localStorage.setItem("lp_theme", theme);
      themeStylesheet.href = `https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/${theme}/bootstrap.min.css`;
    });

    const btnEntrar = document.getElementById("btnEntrar");
    const loginErro = document.getElementById("loginErro");

    btnEntrar.onclick = async () => {
      loginErro.classList.add("d-none");
      const email = document.getElementById("email").value.trim();
      const senha = document.getElementById("senha").value.trim();

      if (!email || !senha) {
        showError("Preencha todos os campos.");
        return;
      }

      btnEntrar.disabled = true;
      btnEntrar.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status"></span>Entrando...';

      try {
        const res = await fetch(API_BASE + "login.php", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, senha })
        });
        const data = await res.json();
        if (data.success && data.usuario_id) {
          document.cookie = `usuario_id=${data.usuario_id}; max-age=3600; path=/`;
          window.location.href = "index.html";
        } else {
          showError(data.message || "E-mail ou senha inválidos.");
          btnEntrar.disabled = false;
          btnEntrar.innerHTML = "Entrar";
        }
      } catch (e) {
        showError("Erro ao conectar. Tente novamente.");
        btnEntrar.disabled = false;
        btnEntrar.innerHTML = "Entrar";
      }
    };

    function showError(msg) {
      loginErro.textContent = msg;
      loginErro.classList.remove("d-none");
    }

    document.addEventListener('keydown', function (e) {
      if (e.key === "Enter" && (document.activeElement.id === "email" || document.activeElement.id === "senha")) {
        btnEntrar.click();
      }
    });
  </script>
</body>

</html>
