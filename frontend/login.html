<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LexPraxis IA - Assistente Jurídico</title>
  <link rel="icon" type="image/png" href="logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body
  class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-blue-100 flex items-center justify-center py-8 sm:py-0">


  <div class="w-full max-w-xs sm:max-w-md mx-auto px-2">
    
    <!-- LOGO E TÍTULO -->
  <div class="w-full text-center mt-4">
    <img src="logo.png" alt="LexPraxis IA" class="mx-auto w-40 sm:w-48 mb-2">
  </div>
    <div
      class="bg-white rounded-2xl shadow-xl px-4 py-8 sm:px-8 sm:py-10 flex flex-col items-center border border-blue-100">
      <div class="w-full flex flex-col items-center mb-4">
        <div class="text-xl sm:text-2xl font-bold text-blue-700 mb-2 tracking-tight">Assistente Jurídico</div>
        <div class="text-base text-gray-600 mb-3">Acesse sua conta</div>
      </div>
      <div class="w-full space-y-4">
        <input type="email" id="email" placeholder="E-mail"
          class="w-full px-4 py-4 rounded-xl border border-blue-100 bg-blue-50 text-gray-700 placeholder-gray-400 focus:ring-2 focus:ring-blue-400 outline-none transition text-base sm:text-lg"
          autocomplete="username" required>
        <input type="password" id="senha" placeholder="Senha"
          class="w-full px-4 py-4 rounded-xl border border-blue-100 bg-blue-50 text-gray-700 placeholder-gray-400 focus:ring-2 focus:ring-blue-400 outline-none transition text-base sm:text-lg"
          autocomplete="current-password" required>
      </div>
      <button id="btnEntrar"
        class="w-full mt-6 py-4 rounded-xl font-semibold text-base sm:text-lg bg-gradient-to-r from-blue-500 to-blue-400 text-white shadow-lg hover:scale-[1.03] hover:from-blue-600 hover:to-blue-500 transition active:scale-95 mb-2">
        Entrar
      </button>
      <div id="loginErro"
        class="hidden mt-2 w-full text-center text-red-500 bg-red-100 border border-red-200 px-4 py-2 rounded-xl font-medium text-sm sm:text-base">
      </div>
      <div class="mt-6 w-full flex items-center justify-center gap-2">
        <span class="text-gray-500 text-sm sm:text-base">Não tem conta?</span>
        <a href="registro.html"
          class="font-semibold text-blue-600 hover:text-blue-800 transition text-sm sm:text-base">Registre-se</a>
      </div>
    </div>
  </div>
  <script src="config.js"></script>
  <script>
    const btnEntrar = document.getElementById("btnEntrar");
    const loginErro = document.getElementById("loginErro");

    btnEntrar.onclick = async () => {
      loginErro.classList.add("hidden");
      const email = document.getElementById("email").value.trim();
      const senha = document.getElementById("senha").value.trim();

      if (!email || !senha) {
        showError("Preencha todos os campos.");
        return;
      }

      const res = await fetch(API_BASE + "login.php", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, senha })
      });
      const data = await res.json();
      if (data.success && data.usuario_id) {
        document.cookie = `usuario_id=${data.usuario_id}; max-age=3600; path=/`;
        window.location.href = "index.html";
      } else {
        showError("Login inválido ou e-mail não validado.");
      }
    };

    function showError(msg) {
      loginErro.textContent = msg;
      loginErro.classList.remove("hidden");
    }

    // Enter envia o login
    document.addEventListener('keydown', function (e) {
      if (e.key === "Enter" && (document.activeElement.id === "email" || document.activeElement.id === "senha")) {
        btnEntrar.click();
      }
    });
  </script>
</body>

</html>
