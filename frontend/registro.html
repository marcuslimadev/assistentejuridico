<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LexPraxis IA - Assistente Jurídico</title>
  <link rel="icon" type="image/png" href="logo.png">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body
  class="min-h-screen bg-gradient-to-br from-blue-50 via-white to-blue-100 flex items-center justify-center py-8 sm:py-0">

  <div class="w-full max-w-xs sm:max-w-md mx-auto px-2">
    <!-- LOGO E TÍTULO -->
    <div class="w-full text-center mt-4">
      <img src="logo.png" alt="LexPraxis IA" class="mx-auto w-40 sm:w-48 mb-2">
    </div>
    <div
      class="bg-white rounded-2xl shadow-xl px-4 py-8 sm:px-8 sm:py-10 flex flex-col items-center border border-blue-100">
      <div class="w-full flex flex-col items-center mb-4">
        <div class="text-xl sm:text-2xl font-bold text-blue-700 mb-2 tracking-tight">Assistente Jurídico</div>
        <div class="text-base text-gray-600 mb-3">Crie sua conta</div>
      </div>
      <div class="w-full space-y-4">
        <input type="text" id="nome" placeholder="Nome completo"
          class="w-full px-4 py-4 rounded-xl border border-blue-100 bg-blue-50 text-gray-700 placeholder-gray-400 focus:ring-2 focus:ring-blue-400 outline-none transition text-base sm:text-lg"
          required>
        <input type="email" id="email" placeholder="E-mail"
          class="w-full px-4 py-4 rounded-xl border border-blue-100 bg-blue-50 text-gray-700 placeholder-gray-400 focus:ring-2 focus:ring-blue-400 outline-none transition text-base sm:text-lg"
          autocomplete="username" required>
        <input type="tel" id="celular" placeholder="Celular (com DDD)"
          class="w-full px-4 py-4 rounded-xl border border-blue-100 bg-blue-50 text-gray-700 placeholder-gray-400 focus:ring-2 focus:ring-blue-400 outline-none transition text-base sm:text-lg"
          maxlength="15" autocomplete="tel-national" required>
        <input type="password" id="senha" placeholder="Senha"
          class="w-full px-4 py-4 rounded-xl border border-blue-100 bg-blue-50 text-gray-700 placeholder-gray-400 focus:ring-2 focus:ring-blue-400 outline-none transition text-base sm:text-lg"
          autocomplete="new-password" required>
        <input type="password" id="confirmaSenha" placeholder="Confirme sua senha"
          class="w-full px-4 py-4 rounded-xl border border-blue-100 bg-blue-50 text-gray-700 placeholder-gray-400 focus:ring-2 focus:ring-blue-400 outline-none transition text-base sm:text-lg"
          autocomplete="new-password" required>
      </div>
      <button id="btnRegistrar"
        class="w-full mt-6 py-4 rounded-xl font-semibold text-base sm:text-lg bg-gradient-to-r from-blue-500 to-blue-400 text-white shadow-lg hover:scale-[1.03] hover:from-blue-600 hover:to-blue-500 transition active:scale-95 mb-2">
        Registrar
      </button>
      <div id="registroErro"
        class="hidden mt-2 w-full text-center text-red-500 bg-red-100 border border-red-200 px-4 py-2 rounded-xl font-medium text-sm sm:text-base">
      </div>
      <div id="registroSucesso"
        class="hidden mt-2 w-full text-center text-green-600 bg-green-100 border border-green-200 px-4 py-2 rounded-xl font-medium text-sm sm:text-base">
      </div>
      <div class="mt-6 w-full flex items-center justify-center gap-2">
        <a href="login.html" class="font-semibold text-blue-600 hover:text-blue-800 transition text-sm sm:text-base">
          Já tem conta? Entrar
        </a>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    const celularInput = document.getElementById("celular");

    celularInput.addEventListener("blur", function (e) {
      let v = e.target.value.replace(/\D/g, "").slice(0, 11);
      if (v.length === 11) {
        const ddd = v.slice(0, 2);
        const prefixo = v.slice(2, 7);
        const sufixo = v.slice(7, 11);
        e.target.value = `(${ddd}) ${prefixo}-${sufixo}`;
      }
    });

    const btnRegistrar = document.getElementById("btnRegistrar");
    const registroErro = document.getElementById("registroErro");
    const registroSucesso = document.getElementById("registroSucesso");

    btnRegistrar.onclick = async () => {
      registroErro.classList.add("hidden");
      registroSucesso.classList.add("hidden");

      const nome = document.getElementById("nome").value.trim();
      const email = document.getElementById("email").value.trim();
      const celular = document.getElementById("celular").value.trim();
      const senha = document.getElementById("senha").value.trim();
      const confirmaSenha = document.getElementById("confirmaSenha").value.trim();

      if (!nome || !email || !celular || !senha || !confirmaSenha) {
        showError("Preencha todos os campos.");
        return;
      }

      const soNumeros = celular.replace(/\D/g, "");
      if (soNumeros.length !== 11) {
        showError("Celular inválido. Informe no formato com DDD e 9 dígitos.");
        return;
      }

      if (senha !== confirmaSenha) {
        showError("As senhas não coincidem.");
        return;
      }

      try {
        const res = await fetch(API_BASE + "registro.php", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ nome, email, celular: soNumeros, senha })
        });

        const data = await res.text();
        if (data.includes("Cadastro realizado") || data.includes("Reenviamos o link")) {
          showSuccess(data);
        } else {
          showError(data);
        }
      } catch (error) {
        showError("Erro ao conectar com o servidor.");
      }
    };

    function showError(msg) {
      registroErro.textContent = msg;
      registroErro.classList.remove("hidden");
    }

    function showSuccess(msg) {
      registroSucesso.textContent = msg;
      registroSucesso.classList.remove("hidden");
    }

    document.addEventListener('keydown', function (e) {
      if (e.key === "Enter" && [
        "nome", "email", "celular", "senha", "confirmaSenha"
      ].includes(document.activeElement.id)) {
        btnRegistrar.click();
      }
    });
  </script>

</body>

</html>
