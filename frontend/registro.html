<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LexPraxis IA - Registro</title>
  <link rel="icon" type="image/png" href="logo.png">
  <script>
    (function () {
      const savedTheme = localStorage.getItem("lp_theme") || "darkly";
      document.write('<link id="themeStylesheet" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/' + savedTheme + '/bootstrap.min.css">');
    })();
  </script>
</head>
<body class="py-5">
  <div class="position-fixed top-0 end-0 p-3" style="z-index: 1055;">
    <label for="themeSelector" class="form-label small mb-1">Tema</label>
    <select id="themeSelector" class="form-select form-select-sm">
      <option value="darkly">Darkly</option>
      <option value="cosmo">Cosmo</option>
      <option value="flatly">Flatly</option>
      <option value="litera">Litera</option>
      <option value="lux">Lux</option>
      <option value="materia">Materia</option>
      <option value="minty">Minty</option>
      <option value="pulse">Pulse</option>
      <option value="sandstone">Sandstone</option>
      <option value="slate">Slate</option>
      <option value="solar">Solar</option>
      <option value="superhero">Superhero</option>
      <option value="vapor">Vapor</option>
      <option value="yeti">Yeti</option>
      <option value="zephyr">Zephyr</option>
    </select>
  </div>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-8 col-lg-5">
        <div class="card shadow">
          <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
              <img src="logo.png" alt="LexPraxis IA" style="width:96px;" class="mb-3">
              <h1 class="h4 mb-1">Assistente Jurídico</h1>
              <p class="text-body-secondary mb-0">Crie sua conta</p>
            </div>

            <div class="mb-3">
              <label for="nome" class="form-label">Nome completo</label>
              <input type="text" id="nome" class="form-control" required>
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">E-mail</label>
              <input type="email" id="email" class="form-control" autocomplete="username" required>
            </div>
            <div class="mb-3">
              <label for="celular" class="form-label">Celular (com DDD)</label>
              <input type="tel" id="celular" class="form-control" maxlength="15" autocomplete="tel-national" required>
            </div>
            <div class="mb-3">
              <label for="senha" class="form-label">Senha</label>
              <input type="password" id="senha" class="form-control" autocomplete="new-password" required>
            </div>
            <div class="mb-3">
              <label for="confirmaSenha" class="form-label">Confirme sua senha</label>
              <input type="password" id="confirmaSenha" class="form-control" autocomplete="new-password" required>
            </div>

            <div class="d-grid">
              <button id="btnRegistrar" class="btn btn-primary">Registrar</button>
            </div>

            <div id="registroErro" class="alert alert-danger mt-3 d-none mb-0"></div>
            <div id="registroSucesso" class="alert alert-success mt-3 d-none mb-0"></div>

            <div class="text-center mt-4">
              <a href="login.html" class="text-decoration-none fw-semibold">Ja tem conta? Entrar</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="config.js"></script>
  <script>
    const themeSelector = document.getElementById("themeSelector");
    const themeStylesheet = document.getElementById("themeStylesheet");
    const currentTheme = localStorage.getItem("lp_theme") || "darkly";
    themeSelector.value = currentTheme;
    themeSelector.addEventListener("change", function () {
      const theme = this.value;
      localStorage.setItem("lp_theme", theme);
      themeStylesheet.href = `https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/${theme}/bootstrap.min.css`;
    });

    const celularInput = document.getElementById("celular");
    celularInput.addEventListener("blur", function (e) {
      let v = e.target.value.replace(/\D/g, "").slice(0, 11);
      if (v.length === 11) {
        const ddd = v.slice(0, 2);
        const prefixo = v.slice(2, 7);
        const sufixo = v.slice(7, 11);
        e.target.value = `(${ddd}) ${prefixo}-${sufixo}`;
      }
    });

    const btnRegistrar = document.getElementById("btnRegistrar");
    const registroErro = document.getElementById("registroErro");
    const registroSucesso = document.getElementById("registroSucesso");

    btnRegistrar.onclick = async () => {
      registroErro.classList.add("d-none");
      registroSucesso.classList.add("d-none");

      const nome = document.getElementById("nome").value.trim();
      const email = document.getElementById("email").value.trim();
      const celular = document.getElementById("celular").value.trim();
      const senha = document.getElementById("senha").value.trim();
      const confirmaSenha = document.getElementById("confirmaSenha").value.trim();

      if (!nome || !email || !celular || !senha || !confirmaSenha) {
        showError("Preencha todos os campos.");
        return;
      }

      const soNumeros = celular.replace(/\D/g, "");
      if (soNumeros.length !== 11) {
        showError("Celular invalido. Informe no formato com DDD e 9 digitos.");
        return;
      }

      if (senha !== confirmaSenha) {
        showError("As senhas nao coincidem.");
        return;
      }

      try {
        const res = await fetch(API_BASE + "registro.php", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ nome, email, celular: soNumeros, senha })
        });

        const data = await res.text();
        if (res.ok && (data.includes("Cadastro realizado") || data.includes("Reenviamos o link"))) {
          showSuccess(data);
        } else {
          showError(data || "Nao foi possivel concluir o cadastro.");
        }
      } catch (error) {
        showError("Erro ao conectar com o servidor.");
      }
    };

    function showError(msg) {
      registroErro.textContent = msg;
      registroErro.classList.remove("d-none");
    }

    function showSuccess(msg) {
      registroSucesso.textContent = msg;
      registroSucesso.classList.remove("d-none");
    }

    document.addEventListener("keydown", function (e) {
      if (e.key === "Enter" && ["nome", "email", "celular", "senha", "confirmaSenha"].includes(document.activeElement.id)) {
        btnRegistrar.click();
      }
    });
  </script>
</body>
</html>
